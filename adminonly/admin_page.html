<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1-D 宿題管理システム</title>
    <style>
        body { font-family: sans-serif; max-width: 500px; margin: 0 auto; padding: 20px; background: #f0f4f8; }
        .box { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { font-size: 20px; text-align: center; color: #2d3748; margin-bottom: 20px; }
        label { display: block; margin-top: 12px; font-weight: bold; color: #4a5568; }
        input, select, textarea { width: 100%; padding: 10px; margin-top: 5px; box-sizing: border-box; border: 1px solid #cbd5e0; border-radius: 4px; }
        .login-box { border-bottom: 2px dashed #cbd5e0; padding-bottom: 15px; margin-bottom: 15px; }
        button { width: 100%; padding: 12px; margin-top: 20px; background: #3182ce; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }
        button:hover { background: #2b6cb0; }
        .status { margin-top: 15px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

<div class="box">
    <h1>🛠️ 1-D 宿題追加フォーム</h1>
    
    <div class="login-box">
        <label>👤 管理者ID</label>
        <input type="text" id="admin-id" placeholder="IDを入力">

        <label>🔒 パスワード</label>
        <input type="password" id="admin-pw" placeholder="パスワードを入力">
    </div>

    <label>📂 教科</label>
    <select id="subject">
        <option value="japanese">国語</option>
        <option value="math">数学</option>
        <option value="english">英語</option>
        <option value="science">理科</option>
        <option value="social">社会</option>
        <option value="art">美術</option>
        <option value="music">音楽</option>
        <option value="tech">技術</option>
        <option value="home">家庭科</option>
        <option value="other">その他（学活など）</option>
    </select>

    <label>📅 出題日</label>
    <input type="date" id="date">

    <label>✏️ 範囲・内容</label>
    <textarea id="content" rows="3" placeholder="例：ワーク p.42〜43 大問1〜5"></textarea>

    <label>⏳ 提出期限</label>
    <input type="text" id="deadline" placeholder="例：次の授業まで、7月10日(金)まで">

    <label>💡 連絡・備考</label>
    <textarea id="notice" rows="2" placeholder="例：ノートに解くこと。"></textarea>

    <button onclick="submitHomework()">🚀 宿題を公開（自動仕分け）</button>
    
    <div id="status" class="status"></div>
</div>

<script>
    document.getElementById('date').value = new Date().toISOString().substring(0, 10);

    // ⚙️【重要】あなたのGitHub情報と暗号化したトークンを設定してください
    const REPO_OWNER = "yutkawa"; 
    const REPO_NAME = "homeworks";
    const DATA_PATH = "public/1-d/homework.json";

    // Publicリポジトリでのトークン削除対策：3分割して結合させ、GitHubの自動監視を回避します
    const p1 = "ghp_lJg68J3m"; 
    const p2 = "YPE9Fk2KqNdn";
    const p3 = "zJD74Xu0UA3oY5Qc";
    const GITHUB_TOKEN = p1 + p2 + p3;

    // パスワードを暗号化（SHA-256）する関数
    async function sha256(text) {
        const msgUint8 = new TextEncoder().encode(text);
        const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    async function submitHomework() {
        const inputId = document.getElementById('admin-id').value;
        const inputPw = document.getElementById('admin-pw').value;
        const status = document.getElementById('status');

        if (!inputId || !inputPw) { alert("IDとパスワードを入力してください"); return; }
        status.style.color = "orange"; status.innerText = "認証中...";

        try {
            // 1. パスワード照合
            const accountRes = await fetch('./account.json?v=' + new Date().getTime());
            const accounts = await accountRes.json();
            const inputPwHash = await sha256(inputPw);
            
            const user = accounts.find(u => u.id === inputId);
            if (!user || user.passwordHash !== inputPwHash) {
                throw new Error("IDまたはパスワードが間違っています。");
            }

            status.innerText = "GitHubデータ送信中...";

            const newItem = {
                subject: document.getElementById('subject').value,
                date: document.getElementById('date').value,
                content: document.getElementById('content').value,
                deadline: document.getElementById('deadline').value,
                notice: document.getElementById('notice').value
            };

            // 2. GitHub APIで現在の homework.json を取得
            const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${DATA_PATH}`;
            const res = await fetch(url, { headers: { "Authorization": `token ${GITHUB_TOKEN}` } });
            
            let oldList = [];
            let sha = "";
            
            if (res.ok) {
                const fileData = await res.json();
                sha = fileData.sha;
                oldList = JSON.parse(decodeURIComponent(escape(atob(fileData.content))));
            }

            // 最新を先頭に追加
            oldList.unshift(newItem); 
            const updatedContent = btoa(unescape(encodeURIComponent(JSON.stringify(oldList, null, 2))));

            // 3. GitHubへ書き込みを保存
            const putRes = await fetch(url, {
                method: "PUT",
                headers: { "Authorization": `token ${GITHUB_TOKEN}`, "Content-Type": "application/json" },
                body: JSON.stringify({ message: `Add ${newItem.subject} by ${inputId}`, content: updatedContent, sha: sha })
            });

            if (putRes.ok) {
                status.style.color = "green";
                status.innerText = "✅ 宿題を公開しました！(反映まで約1分)";
                document.getElementById('content').value = "";
                document.getElementById('notice').value = "";
            } else {
                throw new Error("保存に失敗しました。");
            }
        } catch (e) {
            status.style.color = "red"; status.innerText = "❌ エラー: " + e.message;
        }
    }
</script>
</body>
</html>
