<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1-D 宿題チェッカー</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 🏷️ ヘッダーエリア -->
    <header id="page-header">
        <h1>1-D 宿題チェッカー</h1>
        <p class="update-info">データ更新: <span id="last-updated">--/-- --:--</span></p>
    </header>

    <!-- 📂 教科別ナビゲーションボタン -->
    <p class="filter-headline">Subject</p>
    <nav class="subject-nav">
        <button class="nav-btn active" data-subject="すべて" onclick="filterSubject('すべて')">すべて</button>
        <button class="nav-btn" data-subject="国語" onclick="filterSubject('国語')">国語</button>
        <button class="nav-btn" data-subject="数学" onclick="filterSubject('数学')">数学</button>
        <button class="nav-btn" data-subject="社会" onclick="filterSubject('社会')">社会</button>
        <button class="nav-btn" data-subject="理科" onclick="filterSubject('理科')">理科</button>
        <button class="nav-btn" data-subject="英語" onclick="filterSubject('英語')">英語</button>
        <button class="nav-btn" data-subject="技術・家庭" onclick="filterSubject('技術・家庭')">技術・家庭</button>
        <button class="nav-btn" data-subject="音楽" onclick="filterSubject('音楽')">音楽</button>
        <button class="nav-btn" data-subject="美術" onclick="filterSubject('美術')">美術</button>
        <button class="nav-btn" data-subject="その他" onclick="filterSubject('その他')">その他</button>
    </nav>

    <!-- ⏱️ 表示日数の絞り込みメニュー -->
    <div class="days-filter-container">
        <label for="days-select">アラート対象：</label>
        <select id="days-select" onchange="changeAlertDays(this.value)">
            <option value="3">3日前から表示</option>
            <option value="7">1週間前から表示</option>
            <option value="14" selected>2週間前から表示</option>
            <option value="21">3週間前から表示</option>
            <option value="30">1ヶ月前から表示</option>
        </select>
    </div>

    <!-- ⚠️ 警告ゾーン -->
    <section id="alert-zone" class="alert-zone" style="display: none;">
        <h2 id="alert-title">🔥 もうすぐしめきり！（2週間以内）</h2>
        <div id="alert-container"></div>
    </section>

    <!-- 📋 宿題カードメインエリア -->
    <main>
        <div id="homework-container">
            <div class="loading">宿題データを読み込んでいます...</div>
        </div>
    </main>

    <!-- 🦶 フッターエリア -->
    <footer>
        <p>&copy; 2026 1-D Homework Board</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
