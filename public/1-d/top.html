<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1-D 宿題一覧</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>✏️ 1-D 宿題連絡板</h1>
        <p class="update-info">最終更新日: <span id="js-update">--/--</span></p>
    </header>

    <main id="js-homework-container">
        <p class="loading">スプレッドシートから宿題データを読み込み中...</p>
    </main>

    <footer>
        <p>© 2026 1-D Homework Board</p>
    </footer>

    <script>
        // あなたが発行したGoogle Apps Script (GAS) のURL
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyJgbQJZQDMNt_PqSg6VdpXhrJJHKKpzEKa8Sx5KU4TjF80gLDDbr0mUxhcNf8AUi1p1g/exec"; 

        async function loadHomework() {
            try {
                // GASのURLからデータを引っ張ってくる
                const response = await fetch(GAS_URL);
                if (!response.ok) throw new Error('データの取得に失敗しました');
                
                const data = await response.json();
                
                // 最終更新日時を画面に表示
                document.getElementById('js-update').textContent = data.last_update;
                
                const container = document.getElementById('js-homework-container');
                container.innerHTML = ''; // ローディング文字を消す

                // もし宿題データが一件もない場合
                if(!data.homework_list || data.homework_list.length === 0) {
                    container.innerHTML = '<p class="loading">現在、登録されている宿題はありません。🎉</p>';
                    return;
                }

                // スプレッドシートにある宿題の数だけカードを作って並べる
                data.homework_list.forEach(item => {
                    const card = document.createElement('section');
                    card.className = 'card';
                    card.innerHTML = `
                        <div class="card-header">
                            <span class="subject-badge">${item.subject || '未設定'}</span>
                            <span class="deadline">${item.deadline ? `提出期限: ${item.deadline}` : ''}</span>
                        </div>
                        <div class="card-body">
                            <p class="range">${item.range || '範囲未入力'}</p>
                            ${item.notes ? `<p class="notes">💡 注意: ${item.notes}</p>` : ''}
                        </div>
                    `;
                    container.appendChild(card);
                });

            } catch (error) {
                document.getElementById('js-homework-container').innerHTML = 
                    `<p class="error">エラー: スプレッドシートからのデータ読み込みに失敗しました。GASの設定（アクセス権限を全員にする等）を確認してください。</p>`;
                console.error(error);
            }
        }

        // ページが表示されたら自動で読み込みを開始する
        window.addEventListener('DOMContentLoaded', loadHomework);
    </script>
</body>
</html>
